<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2563EB',
                        secondary: '#F59E0B'
                    },
                    fontFamily: {
                        poppins: ['poppins', 'sans-serif'],

                    },
                }
            }
        }
    </script>


    <title>furstore</title>
</head>

<body class="font-poppins">

    <!-- header section-->
    <header class="w-full shadow py-2 md:py-3 sticky top-0 bg-white">
        <nav class="w-full container mx-auto px-4 flex justify-between   ">

            <div class=" group text-2xl font-bold  flex  sm:text-3xl  md:text-4xl ">
                <span class="text-primary group-hover:text-slate-400">fur</span>
                <span class="text-secondary group-hover:text-slate-400 ">store</span>
            </div>

            <div class="text-2xl hover:text-secondary  md:hidden ">
                <i class="fa-solid fa-bars"></i>
            </div>

            <ul
                class=" hidden  md:flex   text-sm items-center justify-center text-nowrap font-medium  md:text-lg md:gap-3">
                <li class="hover:text-secondary">Home</li>
                <li class="hover:text-secondary">Collection</li>
                <li class="hover:text-secondary">Products</li>
                <li class="hover:text-secondary">Contact us</li>
                <li class="hover:text-secondary">About us </li>
            </ul>

            <div class=" hidden  md:flex text-lg  items-center gap-1 justify-end lg:gap-3">
                <i class="fa-solid fa-magnifying-glass hover:text-secondary"></i>
                <i class="fa-solid fa-user hover:text-secondary"></i>
                <i class="fa-regular fa-star hover:text-secondary"></i>
                <i class="fa-solid fa-cart-shopping hover:text-secondary"></i>
            </div>
        </nav>
    </header>

    <!-- hero section -->
    <section class="w-full py-16 bg-gradient-to-r from-primary to-secondary ">
        <div class="container mx-auto px-4 md:flex gap-5">
            <div class="flex flex-col gap-3 md:justify-center lg:gap-7">
                <h2 class="text-4xl font-bold text-center text-white md:text-5xl lg:text-7xl">New Amazing Products</h2>
                <p class="text-xl text-center text-white">Shop today and <span class="font-semibold">get 20%
                        discount</span></p>
                <div class="flex flex-col gap-2  lg:gap-7 ">
                    <button class=" py-4 font-semibold bg-slate-300 rounded-xl hover:underline md:w-4/5 md:self-center">Shop Now</button>
                    <button class="py-4 font-semibold hover:underline border-2 rounded-xl md:w-4/5 md:self-center">View Categories</button>
                </div>
            </div>

            <div class="md:w-1/2 py-5">
                <img src="assets/images/heroimg.png" class="rounded-2xl" alt="">
            </div>
        </div>
    </section>

</body>

</html>
